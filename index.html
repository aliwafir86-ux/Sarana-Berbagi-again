<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yayasan Sarana Berbagi | Center Layout</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10B981;
            --bg-site: #ECEFF1; /* Warna latar belakang luar layout */
            --white: #FFFFFF;
            --text-main: #111827;
            --border: #E5E7EB;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-site); /* Latar belakang luar */
            display: flex;
            justify-content: center;
        }

        /* Wrapper Utama - Kunci untuk tampilan di tengah */
        .main-wrapper {
            width: 100%;
            max-width: 480px; /* Lebar maksimal ala aplikasi mobile */
            background-color: #F9FAFB; /* Warna latar dalam web */
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* Header */
        header {
            background: var(--white);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            color: var(--primary);
            font-size: 1rem;
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            overflow-x: auto;
            padding: 15px;
            gap: 10px;
            scrollbar-width: none;
        }
        .filter-tabs::-webkit-scrollbar { display: none; }
        
        .tab {
            background: var(--white);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .tab.active {
            background: var(--primary);
            color: var(--white);
            border-color: var(--primary);
        }

        /* Content Card */
        .container { padding: 0 15px; }

        .card {
            background: var(--white);
            border-radius: 16px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .card-img { width: 100%; height: 200px; object-fit: cover; background: #eee; }

        .card-content { padding: 15px; }
        .card-title { font-size: 0.95rem; font-weight: 700; line-height: 1.4; margin-bottom: 12px; }

        .progress-container { margin-bottom: 10px; }
        .progress-bar { background: #E5E7EB; height: 6px; border-radius: 10px; }
        .progress-fill { background: var(--primary); height: 100%; width: 50%; border-radius: 10px; }

        .stats { display: flex; justify-content: space-between; font-size: 0.75rem; }
        .stat-bold { font-weight: 700; color: var(--text-main); }

        /* Bottom Nav - Diatur agar tetap di dalam wrapper tengah */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 480px; /* Harus sama dengan lebar wrapper */
            background: var(--white);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid var(--border);
        }

        .nav-item { text-decoration: none; color: #9CA3AF; text-align: center; font-size: 0.7rem; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <header>
            <div class="logo">SARANA BERBAGI</div>
            <div>🔍</div>
        </header>

        <div class="filter-tabs">
            <div class="tab active">Semua</div>
            <div class="tab">Wakaf</div>
            <div class="tab">Pendidikan</div>
            <div class="tab">Kesehatan</div>
        </div>

        <div class="container">
            <div class="card" style="margin-top: 10px;">
                <img src="https://via.placeholder.com/500x300/10B981/FFFFFF?text=Program+Pilihan" class="card-img">
                <div class="card-content">
                    <h3 class="card-title">Sedekah Jariyah: Bantu Pembangunan Fasilitas Air Bersih</h3>
                    <div class="progress-container">
                        <div class="progress-bar"><div class="progress-fill"></div></div>
                    </div>
                    <div class="stats">
                        <div>Terkumpul<br><span class="stat-bold">Rp 25.000.000</span></div>
                        <div style="text-align: right;">Donatur<br><span class="stat-bold">120+</span></div>
                    </div>
                </div>
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="#" class="nav-item active">🏠<br>Home</a>
            <a href="#" class="nav-item">🤝<br>Donasi</a>
            <a href="#" class="nav-item">📰<br>Berita</a>
            <a href="#" class="nav-item">👤<br>Profil</a>
        </nav>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ice Kulcool | Katalog & Donasi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #FDFDFD;
            --bg-gray: #F3F4F6;
            --white: #FFFFFF;
            --primary: #4E342E; /* Warna Cokelat Ice Kulcool */
            --text-dark: #111827;
            --text-muted: #6B7280;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-dark);
            padding-bottom: 80px;
        }

        /* Header Minimalis ala Yayasan Sarana Berbagi */
        header {
            background: var(--white);
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #F1F1F1;
        }

        .logo-text {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        /* Kategori ala Masjid Sejuta Pemuda */
        .category-tabs {
            display: flex;
            overflow-x: auto;
            padding: 15px 20px;
            gap: 10px;
            scrollbar-width: none;
        }
        .category-tabs::-webkit-scrollbar { display: none; }

        .tab-item {
            background: var(--white);
            border: 1px solid #E5E7EB;
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            white-space: nowrap;
            transition: 0.2s;
        }
        .tab-item.active {
            background: var(--primary);
            color: var(--white);
            border-color: var(--primary);
        }

        /* Container & Card Design */
        .container { padding: 0 20px; }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0 20px;
        }
        .section-header h2 { font-size: 1.1rem; font-weight: 700; }

        .card {
            background: var(--white);
            border-radius: 20px;
            border: 1px solid #F3F4F6;
            box-shadow: var(--shadow-md);
            margin-bottom: 25px;
            overflow: hidden;
        }

        .card-banner {
            width: 100%;
            height: 220px;
            background: #F3F4F6;
            object-fit: cover;
        }

        .card-body { padding: 20px; }

        .badge-status {
            background: #E8F5E9;
            color: #2E7D32;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        /* Progress Bar ala Masjid & Yayasan */
        .donation-status { margin: 15px 0; }
        .progress-bar-bg {
            background: #F3F4F6;
            height: 8px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .progress-fill {
            background: var(--primary);
            height: 100%;
            width: 65%; /* Sesuai progres */
            border-radius: 10px;
        }

        .stats-grid {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
        }
        .stat-label { color: var(--text-muted); display: block; }
        .stat-value { font-weight: 700; color: var(--text-dark); }

        /* Button ala Yayasan Sarana Berbagi */
        .btn-action {
            display: block;
            background: var(--primary);
            color: var(--white);
            text-align: center;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            margin-top: 15px;
            transition: 0.3s;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #F1F1F1;
            z-index: 1000;
        }
        .nav-link {
            text-decoration: none;
            color: var(--text-muted);
            text-align: center;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .nav-link.active { color: var(--primary); }
        .nav-icon { font-size: 1.3rem; display: block; margin-bottom: 3px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-text">ICE KULCOOL</div>
        <div style="font-size: 1.2rem;">🔍</div>
    </header>

    <div class="category-tabs">
        <div class="tab-item active">Semua</div>
        <div class="tab-item">Best Seller</div>
        <div class="tab-item">Menu Buah</div>
        <div class="tab-item">Promo</div>
    </div>

    <div class="container">
        <div class="section-header">
            <h2>Katalog Pilihan ✨</h2>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/600x400/F3F4F6/4E342E?text=Piscok+Lumer+Premium" class="card-banner">
            <div class="card-body">
                <span class="badge-status">READY STOCK</span>
                <h3 class="card-title">Piscok Frozen Lumer - Original Belgian Chocolate</h3>
                
                <div class="donation-status">
                    <div class="progress-bar-bg">
                        <div class="progress-fill"></div>
                    </div>
                    <div class="stats-grid">
                        <div>
                            <span class="stat-label">Terjual</span>
                            <span class="stat-value">132 Pack</span>
                        </div>
                        <div style="text-align: right;">
                            <span class="stat-label">Target</span>
                            <span class="stat-value">200 Pack</span>
                        </div>
                    </div>
                </div>

                <div class="stats-grid" style="border-top: 1px dotted #EEE; padding-top: 15px;">
                    <div>
                        <span class="stat-label">Harga</span>
                        <span class="stat-value" style="font-size: 1rem; color: var(--primary);">Rp 5.000</span>
                    </div>
                    <div style="text-align: right;">
                        <span class="stat-label">Sisa Hari</span>
                        <span class="stat-value">4 Hari lagi</span>
                    </div>
                </div>

                <a href="#" class="btn-action">Pesan Sekarang</a>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-link active"><span class="nav-icon">🏠</span>Beranda</a>
        <a href="#" class="nav-link"><span class="nav-icon">🛍️</span>Katalog</a>
        <a href="#" class="nav-link"><span class="nav-icon">📸</span>Instagram</a>
        <a href="#" class="nav-link"><span class="nav-icon">👤</span>Profil</a>
    </nav>

</body>
</html>

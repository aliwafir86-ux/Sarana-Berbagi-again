<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ice Kulcool | Katalog Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Palette Warna dari yayasan-sarana-berbagi */
            --bg-body: #F9FAFB;
            --white: #FFFFFF;
            --gray-border: #E5E7EB;
            --text-main: #111827;
            --text-muted: #6B7280;
            
            /* Warna Aksen Ice Kulcool */
            --primary-choco: #5D4037; 
            --accent-soft: #FFEDD5;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 90px;
        }

        /* 1. Header Transparan ala Masjid Sejuta Pemuda */
        header {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--gray-border);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .brand { font-weight: 800; font-size: 1.2rem; color: var(--primary-choco); letter-spacing: -0.5px; }

        /* 2. Kategori Filter (Struktur Masjid Sejuta Pemuda) */
        .category-container {
            display: flex;
            overflow-x: auto;
            padding: 15px 20px;
            gap: 8px;
            scrollbar-width: none;
        }
        .category-container::-webkit-scrollbar { display: none; }
        
        .cat-pill {
            background: var(--white);
            border: 1px solid var(--gray-border);
            padding: 8px 18px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            color: var(--text-muted);
            transition: 0.2s;
        }
        .cat-pill.active {
            background: var(--primary-choco);
            color: var(--white);
            border-color: var(--primary-choco);
        }

        /* 3. Grid Produk */
        .main-content { padding: 0 20px; }
        
        .product-card {
            background: var(--white);
            border-radius: 16px;
            border: 1px solid var(--gray-border);
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05); /* Soft shadow ala Vercel theme */
        }

        .card-img {
            width: 100%;
            height: 200px;
            background: #F3F4F6;
            object-fit: cover;
        }

        .card-info { padding: 16px; }

        .tag-row { display: flex; gap: 6px; margin-bottom: 8px; }
        .tag {
            font-size: 10px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 6px;
            text-transform: uppercase;
        }
        .tag-status { background: var(--accent-soft); color: #9A3412; }

        .title { font-size: 1.05rem; font-weight: 700; margin: 0 0 10px 0; }

        /* Progress Bar Sisa Stok (Struktur ala Masjid Sejuta Pemuda) */
        .stock-label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 5px; display: block; }
        .progress-bg { background: #F3F4F6; height: 6px; border-radius: 10px; margin-bottom: 15px; }
        .progress-fill { background: var(--primary-choco); height: 100%; width: 75%; border-radius: 10px; }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--gray-border);
            padding-top: 12px;
        }
        .price { font-weight: 800; font-size: 1.1rem; color: var(--text-main); }
        .btn-buy {
            background: var(--primary-choco);
            color: var(--white);
            padding: 10px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* 4. Bottom Nav ala Masjid Sejuta Pemuda */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            border-top: 1px solid var(--gray-border);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 1001;
        }

        .nav-item {
            text-decoration: none;
            color: var(--text-muted);
            text-align: center;
            font-size: 0.7rem;
            font-weight: 500;
        }
        .nav-item.active { color: var(--primary-choco); }
        .nav-icon { font-size: 1.4rem; display: block; margin-bottom: 2px; }
    </style>
</head>
<body>

<header>
    <div class="brand">ICE KULCOOL</div>
    <div style="cursor: pointer;">🔍</div>
</header>

<div class="category-container">
    <div class="cat-pill active">Semua</div>
    <div class="cat-pill">Varian Pisang</div>
    <div class="cat-pill">Buah Segar</div>
    <div class="cat-pill">Paket Combo</div>
    <div class="cat-pill">Merchandise</div>
</div>

<div class="main-content">
    <div class="product-card">
        <img src="https://via.placeholder.com/500x300/F3F4F6/5D4037?text=Piscok+Lumer" class="card-img" alt="Produk">
        <div class="card-info">
            <div class="tag-row">
                <span class="tag tag-status">🔥 TERLARIS</span>
            </div>
            <h2 class="title">Piscok Frozen Lumer - Classic Dark</h2>
            
            <span class="stock-label">Stok tersedia hari ini: 12/20 pack</span>
            <div class="progress-bg">
                <div class="progress-fill"></div>
            </div>

            <div class="card-footer">
                <div class="price">Rp 5.000</div>
                <a href="#" class="btn-buy">Beli Sekarang</a>
            </div>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <a href="#" class="nav-item active"><span class="nav-icon">🏠</span>Home</a>
    <a href="#" class="nav-item"><span class="nav-icon">🛍️</span>Katalog</a>
    <a href="#" class="nav-item"><span class="nav-icon">📸</span>Instagram</a>
    <a href="#" class="nav-item"><span class="nav-icon">✨</span>Tentang</a>
</nav>

</body>
</html>
